<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>108th PGA Championship — Bet Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <span class="header-icon">🏆</span>
        <div>
          <h1>108<sup>th</sup> PGA Championship</h1>
          <div id="event-meta" class="event-meta">Connecting to leaderboard...</div>
        </div>
      </div>
      <div class="header-right">
        <div class="live-row">
          <span class="pulse" id="pulse"></span>
          <span id="live-label">Live</span>
        </div>
        <button id="refresh-btn" class="refresh-btn" title="Refresh now">↻</button>
      </div>
    </div>
  </header>

  <!-- Summary banner -->
  <div class="summary-bar" id="summary-bar">
    <div class="summary-inner">
      <div class="summary-main">
        <div class="summary-label">Predicted Net P/L</div>
        <div class="summary-pl" id="summary-pl">–</div>
      </div>
      <div class="summary-stats">
        <div class="summary-stat">
          <div class="stat-val" id="stat-stake">–</div>
          <div class="stat-lbl">at stake</div>
        </div>
        <div class="summary-stat">
          <div class="stat-val green" id="stat-winning">–</div>
          <div class="stat-lbl">winning</div>
        </div>
        <div class="summary-stat">
          <div class="stat-val red" id="stat-losing">–</div>
          <div class="stat-lbl">losing</div>
        </div>
        <div class="summary-stat">
          <div class="stat-val muted" id="stat-pending">–</div>
          <div class="stat-lbl">pending</div>
        </div>
      </div>
    </div>
  </div>

  <main>
    <!-- WIN -->
    <section class="bet-section">
      <div class="section-header">
        <h2 class="section-title">WIN</h2>
      </div>
      <div id="win-bets" class="bet-list"></div>
    </section>

    <!-- T20s -->
    <section class="bet-section">
      <div class="section-header">
        <h2 class="section-title">T20s</h2>
      </div>
      <div id="t20-bets" class="bet-list"></div>
    </section>

    <!-- FRL -->
    <section class="bet-section">
      <div class="section-header">
        <h2 class="section-title">FRL</h2>
        <span class="final-pill" id="frl-status-pill">Pending</span>
      </div>
      <div id="frl-note" class="frl-note" style="display:none"></div>
      <div id="frl-bets" class="bet-list"></div>
    </section>

    <!-- PROPS -->
    <section class="bet-section">
      <div class="section-header">
        <h2 class="section-title">PROPS</h2>
      </div>
      <div id="props-bets" class="bet-list"></div>
    </section>

    <!-- Leaderboard -->
    <section class="bet-section">
      <div class="section-header">
        <h2 class="section-title">Current Standings</h2>
      </div>
      <div id="leaderboard" class="lb-wrap">
        <div class="loading">Fetching leaderboard...</div>
      </div>
    </section>
  </main>

  <!-- Debug panel: visible only when ?debug is in the URL -->
  <section class="bet-section" id="debug-panel" style="display:none;margin-top:10px">
    <div class="section-header">
      <h2 class="section-title">Debug — Raw ESPN Data</h2>
    </div>
    <div id="debug-content" style="padding:12px 16px;font-size:0.72rem;font-family:monospace;color:#8b90a8;overflow-x:auto;white-space:pre"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
